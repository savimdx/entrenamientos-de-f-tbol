    <script>
      // Safe JSON.stringify wrapper to prevent circular structure serialization crashes on DOM/React objects
      (function() {
        var originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          var seen = new WeakSet();
          return originalStringify(value, function(key, val) {
            if (typeof val === 'object' && val !== null) {
              if (seen.has(val)) {
                return '[Circular]';
              }
              seen.add(val);
              // Filter out React-specific dynamic fiber attributes on DOM nodes
              if (key.startsWith && key.startsWith('__react')) {
                return undefined;
              }
            }
            if (replacer) {
              return replacer(key, val);
            }
            return val;
          }, space);
        };
      })();

      document.head.appendChild(a);
    </script>
